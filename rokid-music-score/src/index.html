<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{color:#00ff41;font-family:monospace;display:flex;flex-direction:column;padding:5px 8px}

#bar{font-size:12px;color:#00aa33;padding:3px 0 4px;border-bottom:1px solid #003300;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#bar span{flex:1;text-align:center}
#bl{text-align:left!important;color:#007722}
#br{text-align:right!important;color:#007722}

#ct{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px 0}

#ft{font-size:11px;color:#004400;text-align:center;padding:3px 0;border-top:1px solid #003300;flex-shrink:0}

.list{text-align:left;font-size:17px;line-height:2.1;width:100%}
.list .sel{color:#00ff41;font-weight:bold}
.list .nor{color:#006622}

.cover{width:100%;font-size:14px;line-height:1.9;white-space:pre-wrap;text-align:center;color:#00dd33}

.score{width:100%}

.sec{color:#00cc55;font-size:13px;font-weight:bold;margin:6px 0 3px}

.staff{margin-bottom:6px}

.row{
  font-size:14px;
  white-space:pre;
  line-height:1.5;
  color:#00ff41;
  font-family:monospace;
}

.note{color:#005522;font-size:12px;margin-top:2px;font-style:italic}
</style></head><body>
<div id="bar"><span id="bl"></span><span id="bc">♪ 钢琴谱</span><span id="br"></span></div>
<div id="ct"><div style="color:#007722">加载中...</div></div>
<div id="ft">← 上一页 &nbsp;|&nbsp; ● 选择 &nbsp;|&nbsp; 下一页 →</div>
<script>
/*SCORES_DATA_PLACEHOLDER*/
var D=[];try{D=SCORES_DATA;}catch(e){}

var mode='menu',artists=[],artistMap={},curArtist=0;
var songs=[],curSong=0,pages=[],curPage=0,menuIdx=0;

/* 防抖：按键后 300ms 内忽略重复 */
var lastKeyTime=0;
var KEY_DELAY=300;

function $(id){return document.getElementById(id);}

function init(){
  var a={};
  D.forEach(function(s){if(!a[s.artist])a[s.artist]=[];a[s.artist].push(s);});
  artistMap=a;artists=Object.keys(a);
  if(artists.length===0){$('ct').textContent='无曲谱数据';return;}
  showArtistMenu();
}

function showArtistMenu(){
  mode='artist';menuIdx=curArtist;
  $('bc').textContent='♪ 选择歌手';$('bl').textContent='';$('br').textContent=artists.length+'位';
  $('ft').textContent='↑↓ 选择  |  ● 进入';
  renderList(artists,menuIdx);
}

function showSongMenu(){
  mode='song';
  songs=artistMap[artists[curArtist]];menuIdx=curSong;
  $('bc').textContent=artists[curArtist];$('bl').textContent='';$('br').textContent=songs.length+'首';
  $('ft').textContent='↑↓ 选择  |  ● 进入';
  var names=songs.map(function(s){return s.title;});
  renderList(names,menuIdx);
}

function showScore(){
  mode='score';pages=songs[curSong].pages;curPage=0;showScorePage();
}

function showScorePage(){
  var s=songs[curSong];
  $('bc').textContent=s.title;$('bl').textContent=s.artist;$('br').textContent=(curPage+1)+'/'+pages.length;
  $('ft').textContent='● 下一页  |  ← 上一页  |  → 下一页';
  if(curPage===pages.length-1){
    $('ft').textContent='● 回到列表  |  ← 上一页';
  }
  if(curPage===0){
    var d=document.createElement('div');d.className='cover';d.textContent=pages[0];
    $('ct').innerHTML='';$('ct').appendChild(d);
  } else {
    $('ct').innerHTML='<div class="score">'+renderScore(pages[curPage])+'</div>';
  }
}

function renderScore(text){
  var lines=text.split('\n');
  var html='';
  var i=0;
  while(i<lines.length){
    var line=lines[i].trim();
    if(line===''){i++;continue;}
    if(line.indexOf('【')===0){
      html+='<div class="sec">'+esc(line)+'</div>';
      i++;
    } else if(line.indexOf('右:')===0){
      var rhLine=line;
      var lyLine='';var lhLine='';
      if(i+1<lines.length&&lines[i+1].trim().indexOf('词:')===0){lyLine=lines[i+1].trim();i++;}
      if(i+1<lines.length&&lines[i+1].trim().indexOf('左:')===0){lhLine=lines[i+1].trim();i++;}
      html+='<div class="staff">';
      html+='<div class="row">'+esc(rhLine)+'</div>';
      if(lyLine) html+='<div class="row">'+esc(lyLine)+'</div>';
      if(lhLine) html+='<div class="row">'+esc(lhLine)+'</div>';
      html+='</div>';
      i++;
    } else {
      html+='<div class="note">'+esc(line)+'</div>';
      i++;
    }
  }
  return html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderList(items,sel){
  var h='<div class="list">';
  var start=Math.max(0,sel-3),end=Math.min(items.length,start+7);
  if(end-start<7&&items.length>=7)start=Math.max(0,end-7);
  for(var i=start;i<end;i++){
    h+='<div class="'+(i===sel?'sel':'nor')+'">'+(i===sel?'▶ ':'  ')+items[i]+'</div>';
  }
  h+='</div>';$('ct').innerHTML=h;
}

function onKey(k){
  var now=Date.now();
  if(now-lastKeyTime<KEY_DELAY)return;
  lastKeyTime=now;

  if(mode==='artist'){
    if(k==='up'||k==='left'){curArtist=Math.max(0,curArtist-1);menuIdx=curArtist;renderList(artists,menuIdx);}
    if(k==='down'||k==='right'){curArtist=Math.min(artists.length-1,curArtist+1);menuIdx=curArtist;renderList(artists,menuIdx);}
    if(k==='center'){curSong=0;showSongMenu();}
  } else if(mode==='song'){
    if(k==='up'||k==='left'){curSong=Math.max(0,curSong-1);menuIdx=curSong;var n=songs.map(function(s){return s.title;});renderList(n,menuIdx);}
    if(k==='down'||k==='right'){curSong=Math.min(songs.length-1,curSong+1);menuIdx=curSong;var n=songs.map(function(s){return s.title;});renderList(n,menuIdx);}
    if(k==='center'){showScore();}
  } else if(mode==='score'){
    if(k==='center'){
      if(curPage>=pages.length-1){showSongMenu();}
      else{curPage++;showScorePage();}
    }
    if(k==='right'||k==='down'){
      if(curPage>=pages.length-1){showSongMenu();}
      else{curPage++;showScorePage();}
    }
    if(k==='left'||k==='up'){
      if(curPage>0){curPage--;showScorePage();}
    }
  }
}

document.addEventListener('keydown',function(e){
  var m={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down','Enter':'center'};
  if(m[e.key])onKey(m[e.key]);
});

init();
</script></body></html>
